<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<style>
		body{
			font-family: Arial,sans-serif;
			text-align: center;
			margin-top: 50px;
		}
		#status{
			font-size: 1.5rem;
            margin: 20px;
		}
		button{
			padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
		}
	</style>
</head>

<body>
	<!-- the entire body must be written by student -->
    <h1>Enter Metaverse</h1>
	<p id ="status">Enter the Metaverse</p>
	<button id ="enterBtn">Enter</button>
	<script>
		function updatestatus(){
			const statusElement = document.getElementById("status");
			statusElement.outerHTML='<h1 id="status">Entered Metaverse</h1>';
			
		}
		document.getElementById('enterBtn').addEventListener('click',updatestatus);
</script>

</body>

</html>
